version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: readyme-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-readyme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-readyme123}
      POSTGRES_DB: ${POSTGRES_DB:-readyme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-readyme} -d ${POSTGRES_DB:-readyme}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
